# Nginx Configuration for Delicacies Website
# Place in: /etc/nginx/sites-available/delicacies
# Enable with: sudo ln -s /etc/nginx/sites-available/delicacies /etc/nginx/sites-enabled/

# ==================== HTTP REDIRECT ====================
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# ==================== HTTPS SERVER ====================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # ==================== SSL CERTIFICATES ====================
    # Let's Encrypt SSL
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    
    # SSL Protocols (Only modern TLS versions)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256';
    ssl_prefer_server_ciphers on;
    
    # SSL Session
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # OCSP Stapling (Optional)
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ==================== SECURITY HEADERS ====================
    # Strict-Transport-Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" always;
    
    # X-Content-Type-Options
    add_header X-Content-Type-Options "nosniff" always;
    
    # X-Frame-Options
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # X-XSS-Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer-Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions-Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Remove sensitive headers
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # ==================== DOCUMENT ROOT ====================
    root /var/www/delicacies;
    index index.html;
    
    # ==================== LOGGING ====================
    access_log /var/log/nginx/delicacies-access.log;
    error_log /var/log/nginx/delicacies-error.log;

    # ==================== COMPRESSION ====================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types 
        text/plain 
        text/css 
        text/javascript 
        application/json 
        application/javascript 
        application/x-javascript 
        image/svg+xml 
        application/atom+xml 
        application/rss+xml;

    # ==================== CACHING ====================
    # Cache static assets for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # HTML files - must revalidate
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    }
    
    # Service Worker - no cache
    location = /sw.js {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
    
    # Manifest - no cache
    location = /manifest.json {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        types { application/manifest+json json; }
    }

    # ==================== ROUTING ====================
    # Disable directory listing
    autoindex off;
    
    # Fallback for SPA (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==================== SECURITY RULES ====================
    # Deny access to hidden files/directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Protect sensitive files
    location ~ \.(env|json\.lock|sql|zip|tar|rar|config)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ==================== ERROR PAGES ====================
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # ==================== PERFORMANCE ====================
    # Disable buffer in memory write buffers
    proxy_buffering off;
    
    # Increase client body size if needed
    client_max_body_size 100M;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ==================== REDIRECTS ====================
    # Redirect www to non-www (optional)
    # if ($host = 'www.example.com') {
    #     return 301 https://example.com$request_uri;
    # }
    
    # Trailing slash redirect (optional)
    # rewrite ^([^.]*[^/])$ $1/ permanent;
}

# ==================== UPSTREAM ====================
# If serving from application server (optional)
upstream delicacies_app {
    server 127.0.0.1:3000;
    keepalive 32;
}
